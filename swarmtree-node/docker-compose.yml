# Run a Bee LIGHT node for swarmtree-app via Docker.
# Alternative to the native install scripts (./setup.sh + ./start.sh).
#
# Network: Gnosis Chain MAINNET (where Swarm postage stamps + content live).
# Don't switch to BEE_MAINNET=false / Sepolia unless you specifically want
# testnet — testnet stamps don't propagate to the public Swarm gateways, so
# your uploaded pages won't be readable by normal visitors.
#
# Usage:
#   1.  Copy .env.example → .env, set BEE_PASSWORD
#   2.  docker compose up -d
#   3.  docker compose logs -f bee     (watch initial wallet/chain sync)
#   4.  npm install -g @ethersphere/swarm-cli
#       swarm-cli addresses            (your node wallet)
#       fund it on Gnosis Chain via https://fund.ethswarm.org
#   5.  swarm-cli status               (wait until Δ < ~10 blocks)
#   6.  swarm-cli stamp create
#   7.  cd ../swarmtree-app && npm run dev

services:
  bee:
    image: ethersphere/bee:2.7.1
    container_name: swarmtree-bee
    restart: unless-stopped
    command: start
    ports:
      # API on loopback only — never expose 1633 to the public internet
      - "127.0.0.1:1633:1633"
    volumes:
      - bee-data:/home/bee/.bee
    environment:
      BEE_API_ADDR: ":1633"
      BEE_FULL_NODE: "false"
      BEE_SWAP_ENABLE: "true"
      BEE_MAINNET: "true"
      BEE_PASSWORD: ${BEE_PASSWORD:?Set BEE_PASSWORD in .env}
      BEE_BLOCKCHAIN_RPC_ENDPOINT: ${BEE_RPC_ENDPOINT:-https://xdai.fairdatasociety.org}
      BEE_CORS_ALLOWED_ORIGINS: "http://localhost:3000"

volumes:
  bee-data:
